<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Konsultasi Kesehatan — SehatKu</title>
  <link rel="icon" href="../assets/icons/favicon.svg" type="image/svg+xml"/>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <link rel="stylesheet" href="../css/darkmode.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,500;0,600;1,400&display=swap" rel="stylesheet"/>
  <style>
    .chat-container {
      max-width: 780px; margin: 0 auto;
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }
    .chat-header {
      background: linear-gradient(135deg, var(--clr-primary), var(--clr-primary-dk));
      padding: 1.25rem 1.5rem;
      color: #fff;
      display: flex; align-items: center; gap: 1rem;
    }
    .chat-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
    }
    .chat-header-info h3 { font-size: 1rem; font-weight: 700; }
    .chat-header-info p  { font-size: .78rem; opacity: .8; }
    .online-dot {
      width: 10px; height: 10px; background: #4ade80;
      border-radius: 50%; border: 2px solid #fff;
      position: relative; top: -16px; left: -14px; flex-shrink: 0;
    }

    .chat-messages {
      height: 440px; overflow-y: auto; padding: 1.5rem;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .msg {
      display: flex; gap: .75rem; align-items: flex-end; max-width: 85%;
    }
    .msg.user { margin-left: auto; flex-direction: row-reverse; }
    .msg-icon {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--clr-primary-lt);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }
